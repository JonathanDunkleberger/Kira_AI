<!doctype html>
<!--
  cookie_jar_overlay.html — KIRA Cookie Jar v2
  OBS Browser Source: 1920 × 1080, transparent background.
  Connects to ws://localhost:8765 (caption server cookie messages).
  Also connects to ws://localhost:8766/ws/overlays for visibility toggles.

  Assets (relative paths from this file):
    ../web_dashboard/assets/cards/jar_empty_alpha.png     825×1024
    ../web_dashboard/assets/cards/cookie_alpha.png        1024×1024
    ../web_dashboard/assets/cards/cookie_gold_alpha.png   1024×1024
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kira Cookie Jar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }
    #jar-widget {
      position: absolute;
      pointer-events: none;
      transition: opacity 250ms ease;
    }
    #jar-widget.hidden { opacity: 0; }
    #jar-img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
    }
    #cookie-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 12; pointer-events: none;
    }
    #jar-label {
      position: absolute; z-index: 15;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    #jar-label .jar-title {
      font-size: 8px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: #4a2e30; line-height: 1.08; text-align: center;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }
    #jar-label .jar-count {
      font-size: 16px; font-weight: 800;
      color: #4a2e30; line-height: 1;
      letter-spacing: 0.03em;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }
    @keyframes milestone-ring {
      0%   { filter: drop-shadow(0 0 0px  rgba(255,200,60,0)); }
      20%  { filter: drop-shadow(0 0 20px rgba(255,200,60,0.90)); }
      100% { filter: drop-shadow(0 0 0px  rgba(255,200,60,0)); }
    }
    #jar-widget.milestone { animation: milestone-ring 1.2s ease forwards; }
    #drop-canvas {
      position: absolute; top: 0; left: 0;
      width: 1920px; height: 1080px;
      z-index: 1000; pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="drop-canvas" width="1920" height="1080"></canvas>
<div id="jar-widget">
  <canvas id="cookie-canvas"></canvas>
  <img id="jar-img" src="../web_dashboard/assets/cards/jar_empty_alpha.png" alt="">
  <div id="jar-label">
    <span class="jar-title">KIRA'S COOKIE JAR</span>
  </div>
</div>
<script>
(function () {
  'use strict';
  const CFG = {
    JAR_LEFT: 1740, JAR_TOP: 540, JAR_W: 160,
    FILL_X_LO: 0.22, FILL_X_HI: 0.78,
    FILL_Y_LO: 0.36, FILL_Y_HI: 0.92,
    // Taped paper label bounds, measured from jar_empty_alpha.png (825×1024).
    // Anchored to the cream paper note (below the washi tape), not the jar centre.
    LABEL_X_LO: 0.22, LABEL_X_HI: 0.45,
    LABEL_Y_LO: 0.58, LABEL_Y_HI: 0.72,
    COOKIE_SIZE_FRAC: 0.30,
    DROP_ORIGIN_X: 60, DROP_ORIGIN_Y: 60,
    JAR_MOUTH_X_FRAC: 0.50, JAR_MOUTH_Y_FRAC: 0.22,
  };
  const JAR_H = Math.round(CFG.JAR_W / (825 / 1024));

  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const IMG_COOKIE = new Image();
  IMG_COOKIE.src = '../web_dashboard/assets/cards/cookie_alpha.png';
  const IMG_GOLD = new Image();
  IMG_GOLD.src   = '../web_dashboard/assets/cards/cookie_gold_alpha.png';
  let _imagesReady = 0;
  function _onImgLoad() { _imagesReady++; if (_imagesReady >= 2) _renderCookies(); }
  IMG_COOKIE.addEventListener('load', _onImgLoad);
  IMG_GOLD.addEventListener('load',   _onImgLoad);

  const $widget = document.getElementById('jar-widget');
  const $canvas = document.getElementById('cookie-canvas');
  const $label  = document.getElementById('jar-label');
  const $drop   = document.getElementById('drop-canvas');
  const dropCtx = $drop.getContext('2d');

  $widget.style.left   = CFG.JAR_LEFT + 'px';
  $widget.style.top    = CFG.JAR_TOP  + 'px';
  $widget.style.width  = CFG.JAR_W    + 'px';
  $widget.style.height = JAR_H        + 'px';
  $canvas.width = CFG.JAR_W; $canvas.height = JAR_H;
  $canvas.style.width = CFG.JAR_W + 'px'; $canvas.style.height = JAR_H + 'px';

  const lblLeft   = CFG.LABEL_X_LO * CFG.JAR_W;
  const lblTop    = CFG.LABEL_Y_LO * JAR_H;
  const lblWidth  = (CFG.LABEL_X_HI - CFG.LABEL_X_LO) * CFG.JAR_W;
  const lblHeight = (CFG.LABEL_Y_HI - CFG.LABEL_Y_LO) * JAR_H;
  $label.style.left = lblLeft + 'px'; $label.style.top = lblTop + 'px';
  $label.style.width = lblWidth + 'px'; $label.style.height = lblHeight + 'px';

  let shared = 0, cap = 50;
  let milestoneFlashActive = false, milestoneTimer = null, visible = true;

  function _renderCookies() {
    const ctx = $canvas.getContext('2d');
    ctx.clearRect(0, 0, CFG.JAR_W, JAR_H);
    if (shared <= 0) return;

    const fillX0 = CFG.FILL_X_LO * CFG.JAR_W;
    const fillX1 = CFG.FILL_X_HI * CFG.JAR_W;
    const fillY0 = CFG.FILL_Y_LO * JAR_H;
    const fillY1 = CFG.FILL_Y_HI * JAR_H;
    const fillW  = fillX1 - fillX0;
    const fillH  = fillY1 - fillY0;

    // Size a grid that fits the full jar capacity, roughly matching the
    // interior aspect ratio, so `cap` cookies fill the body bottom-to-top.
    const capN  = Math.max(1, cap);
    const cols  = Math.max(1, Math.round(Math.sqrt(capN * fillW / fillH)));
    const rows  = Math.ceil(capN / cols);
    const cellW = fillW / cols;
    const cellH = fillH / rows;
    // Draw cookies noticeably larger than the cell so neighbours overlap into a
    // dense pile (hides the jar's painted label panel and the grid seams).
    const cs    = Math.max(cellW, cellH) * 1.38;

    const drawN = Math.min(shared, capN);
    for (let i = 0; i < drawN; i++) {
      const rng = mulberry32(i * 0x9E3779B1 + 0xDEADBEEF);
      const col = i % cols;
      const row = Math.floor(i / cols);            // row 0 = bottom
      // Brick-stagger alternate rows so the pile doesn't read as a lattice.
      const stagger = (row % 2) ? cellW * 0.5 : 0;
      const jx  = (rng() - 0.5) * cellW * 0.45;
      const jy  = (rng() - 0.5) * cellH * 0.35;
      const rot = (rng() - 0.5) * 2 * (18 * Math.PI / 180);
      let cx_ = fillX0 + (col + 0.5) * cellW + stagger + jx;
      let cy_ = fillY1 - (row + 0.5) * cellH + jy;
      // Keep cookie centres inside the interior so the pile never spills out.
      cx_ = Math.max(fillX0 + cs * 0.25, Math.min(fillX1 - cs * 0.25, cx_));
      const isGold = milestoneFlashActive && (i === drawN - 1);
      const img = isGold ? IMG_GOLD : IMG_COOKIE;
      if (!img.complete || !img.naturalWidth) continue;
      ctx.save();
      ctx.translate(cx_, cy_); ctx.rotate(rot);
      ctx.drawImage(img, -cs / 2, -cs / 2, cs, cs);
      ctx.restore();
    }
  }

  /* Cookie count is shown on the scoreboard overlay, not on the jar. */
  function _updateCount() {}

  function _triggerMilestone() {
    milestoneFlashActive = true;
    $widget.classList.remove('milestone');
    void $widget.offsetWidth;
    $widget.classList.add('milestone');
    if (milestoneTimer) clearTimeout(milestoneTimer);
    milestoneTimer = setTimeout(function () {
      $widget.classList.remove('milestone');
      milestoneFlashActive = false;
      _renderCookies();
    }, 1400);
    _renderCookies();
  }

  var _dropQueue = [], _dropRunning = false;

  function _jarMouthAbs() {
    return {
      x: CFG.JAR_LEFT + CFG.JAR_MOUTH_X_FRAC * CFG.JAR_W,
      y: CFG.JAR_TOP  + CFG.JAR_MOUTH_Y_FRAC * JAR_H,
    };
  }

  function _enqueueDrop(gold) {
    _dropQueue.push({ gold: gold });
    if (!_dropRunning) _runNextDrop();
  }

  function _spawnSparks(ox, oy) {
    var sparks = [];
    for (var i = 0; i < 12; i++) {
      var angle = (i / 12) * Math.PI * 2;
      var speed = 30 + Math.random() * 50;
      sparks.push({ x: ox, y: oy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
                    life: 0.8 + Math.random()*0.2, size: 3 + Math.random()*4 });
    }
    return sparks;
  }

  function _stepSparks(sparks, t) {
    for (var s of sparks) {
      if (t > s.life) continue;
      var st = t / s.life;
      var sx = s.x + s.vx * t * 0.6;
      var sy = s.y + s.vy * t * 0.6 + 30 * t * t;
      var alpha = Math.max(0, 1 - st * 1.5);
      dropCtx.beginPath();
      dropCtx.arc(sx, sy, s.size * (1 - st * 0.5), 0, Math.PI * 2);
      dropCtx.fillStyle = 'rgba(255,' + (180 + Math.round(Math.random()*75)) + ',20,' + alpha.toFixed(2) + ')';
      dropCtx.fill();
    }
  }

  function _runNextDrop() {
    if (_dropQueue.length === 0) { _dropRunning = false; return; }
    _dropRunning = true;
    var item   = _dropQueue.shift();
    var gold   = item.gold;
    var img    = gold ? IMG_GOLD : IMG_COOKIE;
    var mouth  = _jarMouthAbs();
    var ox = CFG.DROP_ORIGIN_X, oy = CFG.DROP_ORIGIN_Y;
    var cs = CFG.COOKIE_SIZE_FRAC * CFG.JAR_W * 1.6;
    var DURATION_MS = gold ? 900 : 700;
    var startTime = performance.now();
    var sparks = gold ? _spawnSparks(ox, oy) : [];

    function frame(now) {
      var t  = Math.min(1, (now - startTime) / DURATION_MS);
      var et = 1 - Math.pow(1 - t, 2);
      dropCtx.clearRect(0, 0, 1920, 1080);
      if (gold) _stepSparks(sparks, t);
      var px = ox + (mouth.x - ox) * et;
      var arcH = -180 * Math.sin(Math.PI * t);
      var py = oy + (mouth.y - oy) * et + arcH;
      var rot = t * Math.PI * 2;
      dropCtx.save();
      dropCtx.translate(px, py); dropCtx.rotate(rot);
      if (img.complete && img.naturalWidth) {
        dropCtx.globalAlpha = t > 0.85 ? Math.max(0, 1 - (t - 0.85) / 0.15) : 1;
        dropCtx.drawImage(img, -cs/2, -cs/2, cs, cs);
      }
      dropCtx.restore(); dropCtx.globalAlpha = 1;
      if (t < 1) requestAnimationFrame(frame);
      else { dropCtx.clearRect(0,0,1920,1080); _runNextDrop(); }
    }
    requestAnimationFrame(frame);
  }

  var retry8765 = 500;
  function connect8765() {
    var ws = new WebSocket('ws://localhost:8765');
    ws.onopen = function () { retry8765 = 500; };
    ws.onmessage = function (ev) {
      var msg; try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === 'cookie_drop') { if (visible) _enqueueDrop(!!msg.gold); return; }
      if (msg.type !== 'cookie') return;
      if (msg.milestone === true) { _triggerMilestone(); return; }
      if (typeof msg.cap === 'number' && msg.cap > 0) cap = msg.cap;
      if (typeof msg.shared === 'number') shared = msg.shared;
      _updateCount(); _renderCookies();
    };
    ws.onclose = function () { setTimeout(connect8765, retry8765); retry8765 = Math.min(retry8765 * 2, 8000); };
    ws.onerror = function () { ws.close(); };
  }

  var retry8766 = 500;
  function connect8766() {
    var ws = new WebSocket('ws://localhost:8766/ws/overlays');
    ws.onopen = function () { retry8766 = 500; };
    ws.onmessage = function (ev) {
      var msg; try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === 'overlay_vis' && typeof msg.cookies_jar === 'boolean') {
        visible = msg.cookies_jar;
        $widget.classList.toggle('hidden', !visible);
      }
    };
    ws.onclose = function () { setTimeout(connect8766, retry8766); retry8766 = Math.min(retry8766 * 2, 8000); };
    ws.onerror = function () { ws.close(); };
  }

  _updateCount(); _renderCookies(); connect8765(); connect8766();
})();
</script>
</body>
</html>
