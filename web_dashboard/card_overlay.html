<!DOCTYPE html>
<!--
  card_overlay.html — Response Cards + Event Banner overlay
  OBS Browser Source: 1920x1080, transparent background.
  Connects to ws://localhost:8766/ws/overlays
  Events: card_show · card_hide · banner_show · banner_hide · overlay_vis · cookie_drop
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px; height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* ═══════════════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════════════ */
#card-root {
  position: absolute;
  left: 48px;
  bottom: 90px;
  width: 400px;
  height: 400px;
  pointer-events: none;
  display: none;
}

#card-img {
  position: absolute;
  inset: 0;
  width: 400px;
  height: 400px;
  filter: drop-shadow(0 4px 6px rgba(60,30,50,0.35));
}

#card-text-layer {
  position: absolute;
  inset: 0;
  width: 400px;
  height: 400px;
  overflow: hidden;
}

.card-name {
  position: absolute;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #b87a8e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}

.card-platform-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}
.platform-twitch  { background: #9146FF; }
.platform-youtube { background: #FF0000; }
.platform-default { background: #8A7050; }

.card-message {
  position: absolute;
  font-size: 11px;
  color: #4a2e30;
  line-height: 1.35;
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 4;
}

@keyframes card-in {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes card-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}
.card-anim-in  { animation: card-in  250ms cubic-bezier(.22,.6,.36,1) both; }
.card-anim-out { animation: card-out 300ms ease-out both; }

/* +1 cookie badge */
#cookie-badge {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(255,240,200,0.92);
  border: 1.5px solid #c8a060;
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 13px;
  font-weight: 800;
  color: #7a4000;
  pointer-events: none;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 200ms ease, transform 200ms ease;
}
#cookie-badge.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════════════════
   BANNER
═══════════════════════════════════════════════════════ */
#banner-root {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 856px;
  height: 148px;
  overflow: hidden;
  pointer-events: none;
  display: none;
}

#banner-img {
  position: absolute;
  width: 1024px;
  height: 1024px;
  top: -424px;
  left: -76px;
  filter: drop-shadow(0 4px 6px rgba(60,30,50,0.35));
}

#banner-text {
  position: absolute;
  top: 16px;
  bottom: 9px;
  left: 119px;
  right: 112px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#banner-text span {
  font-size: 15px;
  font-weight: 700;
  color: #4a2e30;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

@keyframes banner-in  { from { opacity: 0; } to { opacity: 1; } }
@keyframes banner-out { from { opacity: 1; } to { opacity: 0; } }
.banner-anim-in  { animation: banner-in  250ms ease-out both; }
.banner-anim-out { animation: banner-out 300ms ease-out both; }
</style>
</head>
<body>

<!-- Banner -->
<div id="banner-root">
  <img id="banner-img" src="assets/cards/card_banner_wide.png" alt="">
  <div id="banner-text"><span id="banner-txt"></span></div>
</div>

<!-- Response card -->
<div id="card-root">
  <img id="card-img" src="" alt="">
  <div id="card-text-layer">
    <div class="card-name"    id="card-name-el"></div>
    <div class="card-message" id="card-msg-el"></div>
  </div>
  <div id="cookie-badge">+1 🍪</div>
</div>

<script>
/* ── Configuration ─────────────────────────────────── */
const WS_URL         = 'ws://localhost:8766/ws/overlays';
const MIN_DISPLAY_MS = 4000;
const RECONNECT_MS   = 3000;

const VARIANTS = [
  { img: 'assets/cards/card_chat_v1.png',
    zone: { top: 172, left: 116, right: 284, bottom: 240 } },
  { img: 'assets/cards/card_chat_v2.png',
    zone: { top: 164, left: 112, right: 292, bottom: 236 } },
  { img: 'assets/cards/card_chat_v3.png',
    zone: { top: 164, left: 132, right: 264, bottom: 236 } },
];

let _vis         = { chat: true, cards: true, banner: true, scoreboard: true, spectate: true };
let _lastVariant = -1;
let _cardVisible   = false;
let _cardShowTime  = 0;
let _cardHideReady = false;
let _cardQueue     = [];
let _bannerTimer   = null;
let _badgeTimer    = null;

const $cardRoot   = document.getElementById('card-root');
const $cardImg    = document.getElementById('card-img');
const $cardName   = document.getElementById('card-name-el');
const $cardMsg    = document.getElementById('card-msg-el');
const $badge      = document.getElementById('cookie-badge');
const $bannerRoot = document.getElementById('banner-root');
const $bannerTxt  = document.getElementById('banner-txt');

/* ── Card logic ────────────────────────────────────── */
function _pickVariant() {
  const opts = [0,1,2].filter(i => i !== _lastVariant);
  const pick = opts[Math.floor(Math.random() * opts.length)];
  _lastVariant = pick;
  return VARIANTS[pick];
}

function _platformDotHtml(platform) {
  const cls = (platform === 'twitch')  ? 'platform-twitch'
            : (platform === 'youtube') ? 'platform-youtube'
            : 'platform-default';
  return `<span class="card-platform-dot ${cls}"></span>`;
}

function _truncate(text, maxLen) {
  if (!text) return '';
  return text.length > maxLen ? text.slice(0, maxLen).trimEnd() + '\u2026' : text;
}

function showCard(event) {
  const v = _pickVariant();
  const { top, left, right, bottom } = v.zone;
  const zoneW = right - left;
  const zoneH = bottom - top;
  const nameH = 14;
  const gap   = 3;

  $cardImg.src = v.img;

  $cardName.style.cssText = `top:${top}px;left:${left}px;width:${zoneW}px;height:${nameH}px;`;
  $cardName.innerHTML = _truncate(event.chatter || '?', 28)
                      + _platformDotHtml((event.platform || '').toLowerCase());

  $cardMsg.style.cssText = `top:${top+nameH+gap}px;left:${left}px;width:${zoneW}px;height:${zoneH-nameH-gap}px;`;
  $cardMsg.textContent   = _truncate(event.message || '', 140);

  $cardRoot.style.display = 'block';
  $cardRoot.style.opacity = '';
  $cardRoot.classList.remove('card-anim-out');
  void $cardRoot.offsetWidth;
  $cardRoot.classList.add('card-anim-in');
  $cardRoot.addEventListener('animationend', () => $cardRoot.classList.remove('card-anim-in'), { once: true });

  _cardVisible   = true;
  _cardShowTime  = Date.now();
  _cardHideReady = false;
}

function hideCard(callback) {
  $cardRoot.classList.remove('card-anim-in');
  void $cardRoot.offsetWidth;
  $cardRoot.classList.add('card-anim-out');
  $cardRoot.addEventListener('animationend', () => {
    $cardRoot.style.display = 'none';
    $cardRoot.classList.remove('card-anim-out');
    _cardVisible   = false;
    _cardHideReady = false;
    _cardShowTime  = 0;
    if (callback) callback();
    if (_cardQueue.length > 0) showCard(_cardQueue.shift());
  }, { once: true });
}

function maybeDismissCard() {
  if (!_cardVisible || !_cardHideReady) return;
  const age = Date.now() - _cardShowTime;
  if (age < MIN_DISPLAY_MS) { setTimeout(maybeDismissCard, MIN_DISPLAY_MS - age + 50); return; }
  hideCard(null);
}

/* ── Cookie badge ──────────────────────────────────── */
function flashCookieBadge() {
  if (!_cardVisible) return;
  clearTimeout(_badgeTimer);
  $badge.classList.add('visible');
  _badgeTimer = setTimeout(() => $badge.classList.remove('visible'), 1500);
}

/* ── Banner logic ──────────────────────────────────── */
function showBanner(text, durationSec) {
  clearTimeout(_bannerTimer);
  $bannerTxt.textContent = text || '';
  $bannerRoot.style.display = 'block';
  $bannerRoot.style.opacity = '';
  $bannerRoot.classList.remove('banner-anim-out');
  void $bannerRoot.offsetWidth;
  $bannerRoot.classList.add('banner-anim-in');
  $bannerRoot.addEventListener('animationend', () => $bannerRoot.classList.remove('banner-anim-in'), { once: true });
  _bannerTimer = setTimeout(hideBanner, (durationSec || 8) * 1000);
}

function hideBanner() {
  clearTimeout(_bannerTimer);
  _bannerTimer = null;
  $bannerRoot.classList.remove('banner-anim-in');
  void $bannerRoot.offsetWidth;
  $bannerRoot.classList.add('banner-anim-out');
  $bannerRoot.addEventListener('animationend', () => {
    $bannerRoot.style.display = 'none';
    $bannerRoot.classList.remove('banner-anim-out');
  }, { once: true });
}

/* ── Visibility ────────────────────────────────────── */
function applyVis(vis) {
  _vis = { ..._vis, ...vis };
  if (!_vis.cards)  { _cardQueue = []; if (_cardVisible) hideCard(null); }
  if (!_vis.banner) hideBanner();
}

/* ── WebSocket ─────────────────────────────────────── */
function connect() {
  let ws;
  try { ws = new WebSocket(WS_URL); } catch { setTimeout(connect, RECONNECT_MS); return; }

  ws.onmessage = function(ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    switch (msg.type) {
      case 'overlay_vis':  applyVis(msg); break;

      case 'card_show':
        if (!_vis.cards) return;
        if (_cardVisible) _cardQueue.push(msg); else showCard(msg);
        break;

      case 'card_hide':
        _cardHideReady = true;
        maybeDismissCard();
        break;

      case 'banner_show':
        if (!_vis.banner) return;
        showBanner(msg.text, msg.duration_s);
        break;

      case 'banner_hide':
        hideBanner();
        break;

      case 'cookie_drop':
        flashCookieBadge();
        break;
    }
  };

  ws.onclose = function() { setTimeout(connect, RECONNECT_MS); };
  ws.onerror = function() { ws.close(); };
}

connect();
</script>
</body>
</html>
