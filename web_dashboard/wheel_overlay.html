<!DOCTYPE html>
<!--
  wheel_overlay.html — The Wheel of Fortune (cookie jar payoff ceremony)
  OBS Browser Source: 1920 × 1080, transparent background.
  Connects to ws://localhost:8766/ws/overlays
  Events: wheel_spin · wheel_veto · overlay_vis
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1920px; height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none;
}
#fx-canvas {
  position: absolute; inset: 0;
  width: 1920px; height: 1080px;
  pointer-events: none;
  z-index: 5;
}
#wheel-root {
  position: absolute;
  left: 50%; top: 52%;
  transform: translate(-50%, -50%) scale(0.92);
  pointer-events: none;
  opacity: 0;
  transition: opacity 450ms ease, transform 450ms cubic-bezier(.34,1.56,.64,1);
  z-index: 10;
}
#wheel-root.visible { opacity: 1; }
#wheel-root.pop     { transform: translate(-50%, -50%) scale(1); }
#title-banner {
  position: absolute;
  left: 50%; top: -112px;
  transform: translateX(-50%) rotate(-1.4deg);
  padding: 11px 32px 13px;
  background: linear-gradient(180deg, #fdf4e3 0%, #f6e7cd 100%);
  border: 2.5px solid #8b6040;
  border-radius: 8px;
  box-shadow: 0 8px 22px rgba(74,46,48,0.28), inset 0 1px 0 rgba(255,255,255,0.7);
  text-align: center;
  white-space: nowrap;
}
#title-banner::before,
#title-banner::after {
  content: '';
  position: absolute; top: -11px;
  width: 60px; height: 24px;
  background: rgba(184,122,142,0.45);
  border: 1px solid rgba(139,96,64,0.35);
}
#title-banner::before { left: 16px;  transform: rotate(-8deg); }
#title-banner::after  { right: 16px; transform: rotate( 7deg); }
#title-banner .t-main {
  font-size: 32px; font-weight: 900;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: #4a2e30; line-height: 1;
  text-shadow: 0 1px 0 rgba(255,255,255,0.7);
}
#title-banner .t-sub {
  margin-top: 5px;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.04em;
  color: #8b5a4a;
  min-height: 18px;
}
#title-banner .t-sub b { color: #b03a52; }
#pointer {
  position: absolute;
  left: 50%; top: 0;
  transform: translate(-50%, -16px);
  z-index: 14;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.32));
}
@keyframes win-pulse {
  0%,100% { filter: drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
  50%     { filter: drop-shadow(0 0 32px rgba(255,205,90,0.9)) drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
}
#wheel-canvas { filter: drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
#wheel-canvas.win-glow { animation: win-pulse 0.9s ease-in-out infinite; }
#result-label {
  position: absolute;
  left: 50%; top: calc(100% + 4px);
  transform: translateX(-50%) translateY(10px);
  padding: 11px 28px;
  background: linear-gradient(180deg, #fff8ef 0%, #f7e8d0 100%);
  border: 2.5px solid #8b6040;
  border-radius: 12px;
  box-shadow: 0 10px 24px rgba(74,46,48,0.30), inset 0 1px 0 rgba(255,255,255,0.7);
  font-size: 36px;
  font-weight: 900;
  color: #4a2e30;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-shadow: 0 1px 0 rgba(255,255,255,0.7);
  white-space: nowrap;
  text-align: center;
  opacity: 0;
  transition: opacity 400ms ease, transform 400ms cubic-bezier(.34,1.56,.64,1);
}
#result-label.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
#result-label .rl-kicker {
  display: block;
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.18em;
  color: #b87a8e;
  margin-bottom: 3px;
}
</style>
</head>
<body>

<canvas id="fx-canvas" width="1920" height="1080"></canvas>

<div id="wheel-root">
  <div id="title-banner">
    <div class="t-main">The Wheel</div>
    <div class="t-sub" id="title-sub">of Fortune</div>
  </div>
  <canvas id="wheel-canvas"></canvas>
  <svg id="pointer" width="44" height="56" viewBox="0 0 44 56">
    <circle cx="22" cy="14" r="12" fill="#fff8f0" stroke="#8b6040" stroke-width="3"/>
    <path d="M22 25 L10 28 Q22 56 34 28 Z" fill="#b03a52" stroke="#8b6040" stroke-width="2.5"/>
    <path d="M10 28 Q22 56 34 28 L22 31 Z" fill="#8b2a40"/>
  </svg>
  <div id="result-label"><span class="rl-kicker">The wheel says</span><span id="result-text"></span></div>
</div>

<!-- Layer 5 overlay polish: vote-bars, active-mode HUD, winner reveal. -->
<style>
  @keyframes votePanelIn { from { opacity:0; transform:translateX(-50%) translateY(18px); }
                           to   { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes winnerPulse { 0%,100% { box-shadow:0 0 0 0 rgba(255,210,74,.0); }
                           50%      { box-shadow:0 0 22px 4px rgba(255,210,74,.65); } }
  @keyframes hudIn { from { opacity:0; transform:translateX(-50%) translateY(-14px); }
                     to   { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes hudPulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }
  #vote-panel.show { animation:votePanelIn .45s cubic-bezier(.2,.8,.2,1) both; }
  .vote-row.win    { animation:winnerPulse 1.1s ease-in-out 2; }
  #mode-hud.show   { animation:hudIn .4s cubic-bezier(.2,.8,.2,1) both; }
  #mode-hud .dot   { animation:hudPulse 1.4s ease-in-out infinite; }
</style>

<!-- Chat vote-bars -->
<div id="vote-panel" style="position:fixed; left:50%; bottom:7%; transform:translateX(-50%);
     width:760px; max-width:92vw; display:none; font-family:inherit; z-index:50;
     background:rgba(28,20,16,.86); border:2px solid #8b6040; border-radius:16px;
     padding:18px 22px; box-shadow:0 8px 40px rgba(0,0,0,.5);">
  <div id="vote-prompt" style="color:#fff8f0; font-size:22px; font-weight:700;
       text-align:center; margin-bottom:6px; text-shadow:0 2px 6px rgba(0,0,0,.5);"></div>
  <div id="vote-timer" style="color:#f0c8a0; font-size:15px; text-align:center;
       letter-spacing:.3px; margin-bottom:12px;"></div>
  <div id="vote-rows" style="display:flex; flex-direction:column; gap:9px;"></div>
</div>

<!-- Active timed-mode HUD: persists for the whole window with a live countdown.
     Driven by wheel_mode events (registry watcher). Top-center, out of the way. -->
<div id="mode-hud" style="position:fixed; left:50%; top:4%; transform:translateX(-50%);
     display:none; align-items:center; gap:11px; font-family:inherit; z-index:49;
     padding:9px 18px; border-radius:999px; border:2px solid #8b6040;
     background:rgba(28,20,16,.86); box-shadow:0 6px 26px rgba(0,0,0,.45);">
  <span class="dot" style="width:11px; height:11px; border-radius:50%; background:#ffd24a;
        box-shadow:0 0 10px #ffd24a;"></span>
  <span id="mode-hud-label" style="color:#fff8f0; font-size:18px; font-weight:700;
        letter-spacing:.4px;"></span>
  <span id="mode-hud-time" style="color:#f0c8a0; font-size:18px; font-weight:700;
        font-variant-numeric:tabular-nums; min-width:48px; text-align:right;"></span>
</div>

<!-- Build stamp (C): eyeball whether OBS is showing the CURRENT overlay build.
     If this string doesn't match the latest edit, the OBS source is stale. -->
<div id="build-stamp" style="position:fixed; right:9px; bottom:7px; z-index:99;
     font:600 11px/1 'Segoe UI',sans-serif; color:rgba(255,248,240,.45);
     letter-spacing:.4px; pointer-events:none; text-shadow:0 1px 2px rgba(0,0,0,.65);"></div>

<!-- Sync warning (B): shown LOUDLY when a backend slice id isn't in this overlay's
     SLICES array (stale / out-of-sync overlay) — never fail silently. -->
<div id="sync-warning" style="position:fixed; left:50%; top:13%; transform:translateX(-50%);
     z-index:100; display:none; max-width:80vw; text-align:center;
     font:800 20px/1.35 'Segoe UI',sans-serif; color:#fff;
     background:linear-gradient(180deg,#b03a2e,#7a1f18); border:2px solid #ffd24a;
     border-radius:12px; padding:12px 20px; box-shadow:0 8px 30px rgba(0,0,0,.55);"></div>

<script>
/* Build marker (C). BUMP this whenever you edit this overlay — if OBS shows an
   older value, the browser source is cached/stale and must be refreshed. */
const BUILD = '2026-06-18 · wheel 8-slot v2';

/* Wheel wedges — MUST stay id/label-synced with kira/memory/wheel_slices.py
   (the spin animation maps the landed slice_id to its wedge). 8-slot redesign. */
const SLICES = [
  { id: 'accent_mode',         label: 'Accent Mode',       tier: 'common',   color: '#e8d8c0', textColor: '#4a2e30' },
  { id: 'speech_constraint',   label: 'Speech Constraint', tier: 'common',   color: '#f5e6d0', textColor: '#4a2e30' },
  { id: 'targeted_roast',      label: 'Targeted Roast',    tier: 'common',   color: '#f0d8d0', textColor: '#4a2e30' },
  { id: 'hype_man',            label: 'Hype-Man',          tier: 'uncommon', color: '#d8f0e0', textColor: '#105030' },
  { id: 'chat_writes_her_line',label: 'Chat Writes My Line',tier: 'uncommon',color: '#d8e0f0', textColor: '#2030a0' },
  { id: 'truth_or_dare',       label: 'Truth or Dare',     tier: 'uncommon', color: '#e8d0f0', textColor: '#501080' },
  { id: 'lore_drop',           label: 'Lore Drop',         tier: 'rare',     color: '#f0e0a0', textColor: '#604000' },
  { id: 'chaos_mode',          label: 'CHAOS MODE',        tier: 'common',   color: '#f0c8b8', textColor: '#8b2010' },
];

const TIER_RING = { common: '#c8a880', uncommon: '#9090d0', rare: '#d0a020' };

const R       = 320;
const R_INNER = 38;
const PAD     = 44;
const CANVAS_SIZE = (R + PAD) * 2;

const $root    = document.getElementById('wheel-root');
const $canvas  = document.getElementById('wheel-canvas');
const $result  = document.getElementById('result-label');
const $resultT = document.getElementById('result-text');

/* Render the build stamp (C) on load. */
(function () {
  const _b = document.getElementById('build-stamp');
  if (_b) _b.textContent = 'overlay ' + BUILD;
})();

/* Loud out-of-sync warning (B): backend sent a slice id this overlay doesn't know,
   so the SLICES array is stale vs the backend. Surface it on-screen — never quietly
   land on the wrong wedge. */
function _showSyncWarning(sliceId) {
  const _w = document.getElementById('sync-warning');
  if (!_w) return;
  _w.textContent = '⚠ WHEEL OVERLAY OUT OF SYNC — unknown slice "' + sliceId +
                   '". Refresh the OBS browser source (build ' + BUILD + ').';
  _w.style.display = 'block';
}
function _hideSyncWarning() {
  const _w = document.getElementById('sync-warning');
  if (_w) _w.style.display = 'none';
}
const $titleSub= document.getElementById('title-sub');
const $votePanel = document.getElementById('vote-panel');
const $votePrompt= document.getElementById('vote-prompt');
const $voteTimer = document.getElementById('vote-timer');
const $voteRows  = document.getElementById('vote-rows');
const $modeHud   = document.getElementById('mode-hud');
const $modeHudLabel = document.getElementById('mode-hud-label');
const $modeHudTime  = document.getElementById('mode-hud-time');

function _fmtClock(s) {
  s = Math.max(0, s | 0);
  const m = (s / 60) | 0, ss = s % 60;
  return m + ':' + (ss < 10 ? '0' : '') + ss;
}

/* Active-mode HUD (Layer 5). Driven by wheel_mode events; chaos gets a red tint,
   the timed bits a warm gold. Pure projection of registry state. */
function _renderMode(active, label, remainingS, name) {
  if (!active) { $modeHud.classList.remove('show'); $modeHud.style.display = 'none'; return; }
  const chaos = (name === 'chaos');
  $modeHud.style.borderColor = chaos ? '#b03a52' : '#8b6040';
  $modeHud.querySelector('.dot').style.background = chaos ? '#ff5a72' : '#ffd24a';
  $modeHud.querySelector('.dot').style.boxShadow  = '0 0 10px ' + (chaos ? '#ff5a72' : '#ffd24a');
  $modeHudLabel.textContent = label || '';
  $modeHudTime.textContent  = _fmtClock(remainingS);
  if ($modeHud.style.display !== 'flex') {
    $modeHud.style.display = 'flex';
    $modeHud.classList.add('show');
  }
}

/* Vote-bars. State held locally so 'update' frames (counts only) and 'result'
   (winner highlight) re-render without the backend resending labels every tick. */
let _voteLabels = [];
function _renderVote(counts, remainingS, winner) {
  const total = counts.reduce((a, b) => a + b, 0);
  const max   = Math.max(1, ...counts);
  $voteRows.innerHTML = '';
  _voteLabels.forEach(function (label, i) {
    const n = counts[i] || 0;
    const pct = Math.round((n / max) * 100);
    const win = (winner === i);
    const row = document.createElement('div');
    row.className = 'vote-row' + (win ? ' win' : '');
    row.style.cssText = 'position:relative; height:40px; border-radius:9px; overflow:hidden;'
      + 'background:rgba(255,255,255,.08); border:1px solid ' + (win ? '#ffd24a' : '#6b4a30') + ';'
      + (winner >= 0 && !win ? 'opacity:.5;' : '');
    const fill = document.createElement('div');
    fill.style.cssText = 'position:absolute; inset:0 auto 0 0; width:' + pct + '%;'
      + 'background:' + (win ? 'linear-gradient(90deg,#d0a020,#ffd24a)' : 'linear-gradient(90deg,#8b3a52,#b05a72)') + ';'
      + 'transition:width .35s ease;';
    const txt = document.createElement('div');
    txt.style.cssText = 'position:absolute; inset:0; display:flex; align-items:center;'
      + 'justify-content:space-between; padding:0 14px; color:#fff8f0; font-size:17px;'
      + 'font-weight:' + (win ? '800' : '600') + '; text-shadow:0 1px 3px rgba(0,0,0,.6);';
    txt.innerHTML = '<span>' + (i + 1) + '. ' + label + '</span><span>' + n + '</span>';
    row.appendChild(fill); row.appendChild(txt); $voteRows.appendChild(row);
  });
  $voteTimer.textContent = (winner >= 0)
    ? (total + ' vote' + (total === 1 ? '' : 's') + ' cast')
    : (remainingS + 's left  ·  type the number');
}
const ctx      = $canvas.getContext('2d');

$canvas.width  = CANVAS_SIZE;
$canvas.height = CANVAS_SIZE;
$root.style.width  = CANVAS_SIZE + 'px';
$root.style.height = CANVAS_SIZE + 'px';

const CX = CANVAS_SIZE / 2;
const CY = CANVAS_SIZE / 2;
const N  = SLICES.length;
const SLICE_ANGLE = (2 * Math.PI) / N;

function _wobbleR(baseR, angle) {
  return baseR * (1 + 0.010 * Math.sin(angle * 3.7 + 0.9));
}

function drawWheel(rot, winIdx) {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  ctx.beginPath(); ctx.arc(CX, CY, R + 24, 0, Math.PI * 2);
  ctx.fillStyle = '#f3e3c8'; ctx.fill();
  ctx.lineWidth = 6; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, R + 9, 0, Math.PI * 2);
  ctx.lineWidth = 3; ctx.strokeStyle = '#c8a880'; ctx.stroke();

  for (let i = 0; i < N; i++) {
    const startA = rot + i * SLICE_ANGLE - Math.PI / 2;
    const endA   = startA + SLICE_ANGLE;
    const s      = SLICES[i];
    const isWin  = (winIdx === i);

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    for (let a = startA; a <= endA + 0.01; a += 0.04) {
      const r = _wobbleR(R, a);
      ctx.lineTo(CX + Math.cos(a) * r, CY + Math.sin(a) * r);
    }
    ctx.closePath();
    const baseCol = isWin ? _lighten(s.color, 0.22) : s.color;
    const grad = ctx.createRadialGradient(CX, CY, R_INNER, CX, CY, R);
    grad.addColorStop(0, _lighten(baseCol, 0.30));
    grad.addColorStop(1, baseCol);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = isWin ? '#ffcf5a' : (TIER_RING[s.tier] || '#c8a880');
    ctx.lineWidth   = isWin ? 5 : 2.5;
    ctx.stroke();

    const midA  = startA + SLICE_ANGLE / 2;
    const tr    = R * 0.62;
    const tx    = CX + Math.cos(midA) * tr;
    const ty    = CY + Math.sin(midA) * tr;
    ctx.save();
    ctx.translate(tx, ty);
    const fontSize  = 22;
    ctx.font        = '900 ' + fontSize + "px 'Segoe UI', sans-serif";
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth   = 4;
    ctx.lineJoin    = 'round';
    ctx.strokeStyle = 'rgba(255,255,255,0.90)';
    ctx.fillStyle   = s.textColor;
    const words = s.label.split(' ');
    const lines = (words.length === 1)
      ? [s.label]
      : [words.slice(0, Math.ceil(words.length/2)).join(' '),
         words.slice(Math.ceil(words.length/2)).join(' ')];
    lines.forEach((ln, li) => {
      const yy = (li - (lines.length - 1) / 2) * (fontSize + 3);
      ctx.strokeText(ln, 0, yy);
      ctx.fillText(ln, 0, yy);
    });
    ctx.restore();
  }

  for (let i = 0; i < N; i++) {
    const a = rot + i * SLICE_ANGLE - Math.PI / 2;
    const px = CX + Math.cos(a) * (R + 1);
    const py = CY + Math.sin(a) * (R + 1);
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff8f0'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  }

  ctx.beginPath(); ctx.arc(CX, CY, R_INNER + 6, 0, Math.PI * 2);
  ctx.fillStyle = '#f3e3c8'; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, R_INNER, 0, Math.PI * 2);
  ctx.fillStyle = '#fff8f0'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = '#c8a880'; ctx.stroke();
  _drawPixelHeart(ctx, CX, CY, 6, '#b87a8e');
}

function _lighten(col, amt) {
  let r, g, b;
  if (col[0] === '#') {
    r = parseInt(col.slice(1,3), 16);
    g = parseInt(col.slice(3,5), 16);
    b = parseInt(col.slice(5,7), 16);
  } else {
    const m = col.match(/(\d+)\D+(\d+)\D+(\d+)/);
    if (!m) return col;
    r = +m[1]; g = +m[2]; b = +m[3];
  }
  const lr = Math.min(255, Math.round(r + (255-r)*amt));
  const lg = Math.min(255, Math.round(g + (255-g)*amt));
  const lb = Math.min(255, Math.round(b + (255-b)*amt));
  return 'rgb(' + lr + ',' + lg + ',' + lb + ')';
}

function _drawPixelHeart(ctx, cx, cy, px, color) {
  const HEART = [
    [0,1],[0,2],[0,4],[0,5],
    [1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],
    [2,0],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],
    [3,1],[3,2],[3,3],[3,4],[3,5],
    [4,2],[4,3],[4,4],
    [5,3],
  ];
  const ox = cx - 3.5 * px;
  const oy = cy - 3 * px;
  ctx.fillStyle = color;
  for (const [r, c] of HEART) {
    ctx.fillRect(ox + c * px, oy + r * px, px - 1, px - 1);
  }
}

const $fx = document.getElementById('fx-canvas');
const fxc = $fx.getContext('2d');
let _confetti = [];
let _fxRAF = null;
const CONF_COLORS = ['#b87a8e', '#f0c8b8', '#d0a020', '#9090d0', '#f5e6d0', '#b03a52'];

function burstConfetti() {
  const cx = 1920 / 2, cy = 1080 * 0.52;
  for (let i = 0; i < 80; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 6 + Math.random() * 12;
    _confetti.push({
      x: cx, y: cy,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 7,
      g: 0.28 + Math.random() * 0.15,
      size: 7 + Math.random() * 8,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0],
      heart: Math.random() < 0.5,
      life: 0, ttl: 95 + Math.random() * 45,
    });
  }
  if (!_fxRAF) _fxRAF = requestAnimationFrame(_fxFrame);
}

function _fxFrame() {
  fxc.clearRect(0, 0, 1920, 1080);
  for (const p of _confetti) {
    p.life++;
    p.vy += p.g;
    p.x += p.vx; p.y += p.vy;
    p.rot += p.vr;
    const alpha = Math.max(0, 1 - p.life / p.ttl);
    fxc.save();
    fxc.globalAlpha = alpha;
    fxc.translate(p.x, p.y);
    fxc.rotate(p.rot);
    if (p.heart) {
      _drawPixelHeart(fxc, 0, 0, p.size / 6, p.color);
    } else {
      fxc.fillStyle = p.color;
      fxc.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    }
    fxc.restore();
  }
  _confetti = _confetti.filter(p => p.life < p.ttl && p.y < 1180);
  if (_confetti.length) {
    _fxRAF = requestAnimationFrame(_fxFrame);
  } else {
    fxc.clearRect(0, 0, 1920, 1080);
    _fxRAF = null;
  }
}

/* ══════════════════════════════════════════════════════════════════════
   CEREMONY TIMING (all tunable — durations in ms)
   Total on-screen ≈ entranceMs + spinMs + holdMs + resultMs
══════════════════════════════════════════════════════════════════════ */
const CFG = {
  entranceMs: 1800,   // anticipation hold after appearing, before the spin
  spinMs:     6000,   // spin duration (strong ease-out, teases past slices)
  holdMs:     4500,   // land hold: glow pulse + confetti before the result card
  resultMs:   5500,   // result card ("The wheel says…") on-screen time
};

let _spinRAF = null;
let _winIdx  = -1;
let _visible = { wheel: true };

function _sliceIdxToAngle(idx) {
  // Land slice `idx` directly under the TOP pointer (12 o'clock = canvas angle
  // -π/2). drawWheel() places slice i's midpoint at rot + i*SLICE_ANGLE +
  // SLICE_ANGLE/2 - π/2, so solving midpoint = -π/2 gives this rotation. The
  // previous formula carried an extra -π/2, landing the winner at 9 o'clock
  // while the pointer read a different slice — the "announced ≠ landed" bug.
  return -idx * SLICE_ANGLE - SLICE_ANGLE / 2;
}

function spin(sliceId, durationMs, onFinish) {
  if (_spinRAF) cancelAnimationFrame(_spinRAF);
  $canvas.classList.remove('win-glow');
  _winIdx = SLICES.findIndex(s => s.id === sliceId);
  if (_winIdx < 0) {
    // LOUD failure (no silent default-to-slice-0): an unknown slice id means this
    // overlay's SLICES array is out of sync with the backend — almost always a
    // STALE cached overlay in OBS. Scream it instead of quietly landing wrong.
    console.warn('[wheel] OUT OF SYNC: backend slice id "' + sliceId +
                 '" not in overlay SLICES [' + SLICES.map(s => s.id).join(', ') +
                 ']. Overlay is likely stale — refresh the OBS source. build=' + BUILD);
    _showSyncWarning(sliceId);
    _winIdx = 0;  // still spin to *something* so the ceremony completes
  } else {
    _hideSyncWarning();
  }

  const targetRot  = _sliceIdxToAngle(_winIdx);
  const FULL_SPINS = 6 + Math.random() * 2;   // more revolutions for drama
  const startRot   = 0;
  const totalDelta = FULL_SPINS * Math.PI * 2 + _normalise(targetRot - startRot);
  const startTime  = performance.now();

  /* Strong ease-out — slow, teasing deceleration near the end. */
  function _easeOut(t) { return 1 - Math.pow(1 - t, 6); }

  function frame(now) {
    const t   = Math.min(1, (now - startTime) / durationMs);
    const et  = _easeOut(t);
    /* No settle overshoot: pure monotonic ease-out so the pointer decelerates
       INTO the winner and STOPS. The old additive wobble pushed et past 1,
       swinging ~0.5 slice into the neighbour and rocking back — the "lands then
       switches" illusion. The strong ease-out already gives the slow, teasing
       deceleration without ever crossing the winner. */
    const rot = startRot + totalDelta * et;
    drawWheel(rot % (Math.PI * 2), t >= 1 ? _winIdx : -1);
    if (t < 1) {
      _spinRAF = requestAnimationFrame(frame);
    } else {
      drawWheel(targetRot % (Math.PI * 2), _winIdx);
      $canvas.classList.add('win-glow');
      burstConfetti();
      if (onFinish) onFinish();
    }
  }
  _spinRAF = requestAnimationFrame(frame);
}

function _normalise(a) {
  while (a < 0) a += Math.PI * 2;
  while (a > Math.PI * 2) a -= Math.PI * 2;
  return a;
}

function _esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function showWheel(tipper) {
  $titleSub.innerHTML = tipper
    ? '<b>' + _esc(tipper) + '</b> filled the jar!'
    : 'of Fortune';
  $root.classList.add('visible');
  requestAnimationFrame(() => $root.classList.add('pop'));
}
function hideWheel() {
  if (typeof _clearCeremony === 'function') _clearCeremony();
  $root.classList.remove('visible', 'pop');
  $result.classList.remove('visible');
  $resultT.textContent = '';
  $canvas.classList.remove('win-glow');
  _hideSyncWarning();
  if (_spinRAF) { cancelAnimationFrame(_spinRAF); _spinRAF = null; }
  _confetti = [];
  _winIdx = -1;
  drawWheel(0, -1);
}

drawWheel(0, -1);

const WS_URL    = 'ws://localhost:8766/ws/overlays';
const RECONNECT = 3000;

/* Pending ceremony timers — cleared on veto / new spin / hide. */
let _ceremony = [];
function _clearCeremony() {
  for (const id of _ceremony) clearTimeout(id);
  _ceremony = [];
}

function connect() {
  let ws;
  try { ws = new WebSocket(WS_URL); } catch { setTimeout(connect, RECONNECT); return; }

  ws.onmessage = function (ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'overlay_vis') {
      if (typeof msg.wheel === 'boolean') _visible.wheel = msg.wheel;
      if (!_visible.wheel) hideWheel();
      return;
    }

    if (!_visible.wheel) return;

    if (msg.type === 'wheel_spin') {
      _clearCeremony();
      $result.classList.remove('visible');
      $resultT.textContent = '';

      const sliceId = msg.result || 'ghost_story';
      const label   = msg.label || '';

      /* PHASE 1 — ENTRANCE: fade/scale in, then hold for anticipation.
         Honor the backend-sent timings (single source of truth) so the wheel's
         landing and Kira's reaction stay in lockstep; fall back to local CFG
         defaults for older backends that don't send them. */
      const spinMs     = msg.spin_ms     || CFG.spinMs;
      const entranceMs = msg.entrance_ms || CFG.entranceMs;
      showWheel(msg.tipper || '');

      _ceremony.push(setTimeout(function () {
        /* PHASE 2 — SPIN: long, dramatic, strong ease-out. */
        spin(sliceId, spinMs, function () {
          /* PHASE 3 — LAND: glow pulse + confetti already firing; hold so the
             slice reads clearly and Kira can react. Re-burst confetti midway
             so it doesn't die out during the long hold. */
          _ceremony.push(setTimeout(burstConfetti, Math.round(CFG.holdMs * 0.45)));

          _ceremony.push(setTimeout(function () {
            /* PHASE 4 — RESULT CARD: "The wheel says…" holds, then fades. */
            $resultT.textContent = label;
            $result.classList.add('visible');
            _ceremony.push(setTimeout(hideWheel, CFG.resultMs));
          }, CFG.holdMs));
        });
      }, entranceMs));
    }

    if (msg.type === 'wheel_veto') {
      _clearCeremony();
      hideWheel();
      $votePanel.style.display = 'none';
    }

    if (msg.type === 'wheel_vote') {
      if (msg.phase === 'open') {
        _voteLabels = msg.labels || [];
        $votePrompt.textContent = msg.prompt || '';
        _renderVote(msg.counts || _voteLabels.map(function () { return 0; }),
                    msg.remaining_s || 0, -1);
        $votePanel.style.display = 'block';
        $votePanel.classList.remove('show'); void $votePanel.offsetWidth; // restart anim
        $votePanel.classList.add('show');
      } else if (msg.phase === 'update') {
        _renderVote(msg.counts || [], msg.remaining_s || 0, -1);
      } else if (msg.phase === 'result') {
        _renderVote(msg.counts || [], 0, (typeof msg.winner === 'number' ? msg.winner : -1));
        burstConfetti();   // winner reveal pop
        /* Hold the winning bar a few seconds, then clear. */
        _ceremony.push(setTimeout(function () {
          $votePanel.style.display = 'none'; $votePanel.classList.remove('show');
        }, 5000));
      }
    }

    if (msg.type === 'wheel_mode') {
      _renderMode(!!msg.active, msg.label || '', msg.remaining_s || 0, msg.name || '');
    }
  };

  ws.onclose = function () { setTimeout(connect, RECONNECT); };
  ws.onerror = function () { ws.close(); };
}

connect();
</script>
</body>
</html>
