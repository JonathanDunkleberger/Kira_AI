<!DOCTYPE html>
<!--
  Kira — KIRA CAM scene
  OBS Browser Source: 1920 × 1080, local file URL.
  Avatar is layered on top by OBS — this source provides background
  ambience only (no banner card).

  Drop scene_kiracam.jfif is in this folder. CFG regions measured via
  warm-bias pixel scan on the 1024×572 source image.
  Avatar is layered on top by OBS (no banner card in this scene).

  ── AMBIENT AUDIO ─────────────────────────────────────────────────────────
  Drop CC0 audio loops into  web_dashboard/screens/ambience/  (see README).
  Select the file + set volume from the dashboard Stream Screens panel.
  OBS note: enable "Control audio via OBS" on this browser source so the
  page audio is routed into the stream mix.

  ── LIVE CRT ──────────────────────────────────────────────────────────────
  The CRT monitor screen shows animated state-driven pixel art driven by
  the bot state WS (ws://127.0.0.1:8766/ws). States:
    speaking  — waveform bars animate while Kira talks
    chess     — chess knight icon with glow pulse
    chat      — pixel heart with beat pulse (rate ∝ chat_rate)
    idle      — sleeping cat + drifting zzz (after 60s of no activity)
    fallback  — static heart (WS disconnected / bot offline)
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920">
  <title>Kira Cam — Kira</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* CRT live canvas sits between bg and the glow overlay.
       mix-blend-mode:screen makes the dark (cleared) background transparent
       so the green glyph ADDS onto the painted glass instead of covering it.
       The desk_foreground.png layer (later in DOM) renders on top, so the
       lamp and lower bezel naturally occlude the canvas. */
    #crt-live {
      position: absolute;
      pointer-events: none;
      image-rendering: pixelated;
      mix-blend-mode: screen;
      /* left/top/width/height set by JS from CFG.crtDisplayRegion */
    }
  </style>
  <script>
  /* ═══════════════════════════════════════════════════════════════════════
     SCENE CONFIGURATION — all x/y/w/h are fractions of 1920×1080.
     Measured from scene_kiracam.jfif (1024×572) via warm-bias pixel scan.
  ═══════════════════════════════════════════════════════════════════════ */
  const CFG = {

    /* -- Window glass region — measured from scene_kiracam.jfif ---------- */
    /* Large center window, two panes. Mullion at x≈0.499 blocked by mask.  */
    /* Top nudged in +2% from measured frame edge (belt-and-suspenders).    */
    snowRegion:   { x: 0.278, y: 0.090, w: 0.398, h: 0.510 },

    /* -- Mirror region — small reflective glass panel, top-right ----------
     * The dark reflective glass is ONLY the left third of the top-right
     * panel: src x≈812-880 (display 1526-1655). RIGHT of the wooden mullion
     * (src x≈885+) is the sticky-note WALL — snow must NOT land there.
     * Confined to the glass (2026-06-12): x=0.795, w=0.067 → right edge
     * 0.862 (display 1655) stops at the mullion, off the wall.
     * Top edge of the glass is ANGLED in the art; a rectangle must fit
     * INSIDE it, so y dropped to 0.058 (top below the angle's lowest point)
     * and w trimmed to 0.054 so the rightmost flakes stay off the mullion.
     * h trimmed to 0.080 so the bottom stops ABOVE the hanging plant's
     * leaves (which rise into the glass bottom-left, ~display y147).
     * Occlusion mask (maskWbThresh=65) handles the hanging plant leaves. */
    mirrorRegion:    { x: 0.795, y: 0.058, w: 0.054, h: 0.080 },
    mirrorSnowCount: 14,

    /* -- CRT monitor — right side of scene --------------------------------
     * Measured quad from scene_kiracam.jfif (1024×572) with object-fit:
     * cover scale 1.8881×. Screen is viewed straight-on; no perspective.
     *   TL (1589, 481)  TR (1820, 481)
     *   BL (1589, 739)  BR (1820, 739)   ← full glass 231×258px display
     * desk_foreground.png is transparent at source y=250-286 (display
     * y=472-540, 68px fully clear) then fades opaque by y=586 (transition).
     * Lamp & lower bezel are ALREADY opaque in the foreground PNG and
     * occlude the canvas naturally (foreground is later in DOM / higher z). */
    crtRegion:    { x: 0.8276, y: 0.4454, w: 0.1203, h: 0.2380 },

    /* CRT live-glyph canvas — rendered ON TOP of desk_foreground.png.
     * The TV + its painted mint heart live in the OPAQUE foreground PNG, so a
     * canvas behind it can never show on the screen (it only pokes above the
     * TV's top edge → broken heart on the wall). Instead the canvas sits last
     * in the DOM with mix-blend-mode:screen: the green glyph ADDS onto the
     * painted TV heart (reinforcing/animating it) while black areas vanish.
     * Painted heart centroid measured at display (1696, 659), size ~57×53px.
     * px=8 heart is 56×48px, centred in canvas at (116, 47):
     *   left = 1696-116 = 1580 → 0.8229 ; top = 659-47 = 612 → 0.5667 */
    crtDisplayRegion: { x: 0.8229, y: 0.5667, w: 0.1203, h: 0.0963 },
    crtDisplayEnabled: true,
    /* Safe margin (fraction of canvas, each side) inside which EVERY glyph
       state must render. Larger → smaller glyph, more clearance from the
       bezel/lamp. The glyph fills this inset box, so ~0.10 lands the artwork
       at roughly 80% of the glass. One number to taste-tune all five states. */
    glyphInsetFrac: 0.10,

    /* -- String-light bulb positions — measured from scene_kiracam.jfif -- */
    /* Left strand → center drape over window → right wall strand           */
    lightPoints: [
      [0.008, 0.067],  /* far-left corner         */
      [0.035, 0.113],  /* left wall               */
      [0.112, 0.176],  /* left wall, lower        */
      [0.265, 0.098],  /* top of left window pane */
      [0.365, 0.080],  /* drape over window center*/
      [0.406, 0.087],  /* center                  */
      [0.543, 0.140],  /* center-right drape      */
      [0.635, 0.079],  /* top right side of window*/
      [0.796, 0.072],  /* right wall top          */
      [0.867, 0.018],  /* top-right corner        */
      [0.944, 0.068],  /* far right               */
    ],

    /* -- Snow particles ------------------------------------------------- */
    snowCount:    55,
    snowSpeedMin: 0.28, snowSpeedMax: 0.75,
    snowSizeMin:  2,    snowSizeMax:  5,
    snowOpMin:    0.28, snowOpMax:    0.82,
    snowDrift:    0.14,

    /* -- Occlusion mask — warm amber scene; glass is wb~24-65, frame >80 */
    maskWbThresh: 65,   /* R-B < 65 = glass (cooler than walls/frame) */
    maskLumMin:   40,   /* exclude very dark frame/mullion pixels */
    maskLumMax:  120,   /* exclude bright lights from counting as sky */

    /* -- CRT screen flicker --------------------------------------------- */
    crtBaseGlow: 0.15, crtAmp: 0.06, crtPeriod: 3200,

    /* -- String-light twinkle ------------------------------------------- */
    lightRadius: 6, lightPeriodMin: 2000, lightPeriodMax: 5000,

    /* -- NO banner card on Kira Cam — avatar fills the centre ----------- */
    /* cardSize / cardLeft / cardTop / textSafe* intentionally omitted.    */

    /* -- Screen identity for live text control from dashboard ----------- */
    screenName: 'kira_cam',

    /* -- Ambient audio -------------------------------------------------- */
    /* ambienceVolume default; overridden live from dashboard state        */
    ambienceVolume: 0.06,

  };
  </script>
</head>
<body>
  <div id="scene">
    <img class="bg" src="scene_kiracam.jfif" alt="">
    <canvas id="snow-canvas" width="1920" height="1080"></canvas>
    <div id="crt-overlay"></div>
    <div id="lights-layer"></div>
    <!-- Foreground: desk surface cuts in front of snow — OBS avatar goes between these layers -->
    <img class="fg" src="desk_foreground.png" alt="">
    <!-- CRT live glyph sits ON TOP of the foreground TV (screen-blend adds the
         animated heart onto the painted TV screen; black areas stay invisible). -->
    <canvas id="crt-live" width="231" height="104"></canvas>
    <!-- No banner card. OBS layers the avatar source on top of this. -->
  </div>

  <script src="anim.js"></script>

  <!-- ── Kira Cam page-specific: Live CRT + Ambient Audio ──────────────── -->
  <script>
  (function () {
    'use strict';

    const W = 1920, H = 1080;

    /* ════════════════════════════════════════════════════════════════════
       AMBIENT AUDIO
       Uses Web Audio API AudioBufferSourceNode.loop = true for true
       gapless looping (no gap between buffer end and restart).
       OBS Browser Source: enable "Control audio via OBS" on this source
       to route the page audio into the stream mix.
    ════════════════════════════════════════════════════════════════════ */
    let _audioCtx   = null;
    let _gainNode   = null;
    let _sourceNode = null;
    let _curFile    = '';
    let _curVol     = CFG.ambienceVolume;

    function _ensureAudioCtx() {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        _gainNode = _audioCtx.createGain();
        _gainNode.gain.value = _curVol;
        _gainNode.connect(_audioCtx.destination);
      }
      if (_audioCtx.state === 'suspended') _audioCtx.resume().catch(() => {});
    }

    async function _loadAndPlay(file) {
      if (!file || file === 'off') { _stopAmbience(); return; }
      if (file === _curFile) return;  /* already playing */
      try {
        _ensureAudioCtx();
        const resp = await fetch('ambience/' + encodeURIComponent(file));
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const arrayBuf = await resp.arrayBuffer();
        const audioBuf = await _audioCtx.decodeAudioData(arrayBuf);
        _startBuffer(audioBuf, file);
      } catch (e) {
        console.warn('[KiraCam] Ambience load failed:', e);
      }
    }

    function _startBuffer(buf, file) {
      _stopAmbience(/* keepFile */ true);
      _curFile = file;
      const src = _audioCtx.createBufferSource();
      src.buffer  = buf;
      src.loop    = true;   /* true gapless loop — no MP3 gap */
      src.connect(_gainNode);
      src.start(0);
      _sourceNode = src;
    }

    function _stopAmbience(keepFile) {
      if (_sourceNode) {
        try { _sourceNode.stop(); } catch (_) {}
        _sourceNode = null;
      }
      if (!keepFile) _curFile = '';
    }

    function _setVolume(v) {
      _curVol = Math.max(0, Math.min(1, v));
      if (_gainNode && _audioCtx) {
        _gainNode.gain.setTargetAtTime(_curVol, _audioCtx.currentTime, 0.05);
      }
    }

    function _applyAmbienceState(ambience) {
      if (!ambience) return;
      const file = ambience.file || '';
      const vol  = typeof ambience.volume === 'number' ? ambience.volume : CFG.ambienceVolume;
      _setVolume(vol);
      if (!file || file === 'off') {
        if (_curFile) _stopAmbience();
      } else {
        _loadAndPlay(file);
      }
    }

    /* ════════════════════════════════════════════════════════════════════
       LIVE CRT DISPLAY
       State machine driven by /ws bot state. Falls back to static heart
       when the WS is disconnected.

       States: speaking | chess | chat | idle | fallback
       Palette: green phosphor (~#44cc44 peak, #050f05 background)
    ════════════════════════════════════════════════════════════════════ */

    /* Green phosphor palette */
    const C = {
      bg:     '#050f05',
      dim:    '#1a3a1a',
      mid:    '#2d7a2d',
      bright: '#44cc44',
      glow:   '#7aff7a',
    };

    /* Pixel art lookup tables — each entry is [row, col] in a grid.
       Origin = top-left of the icon's bounding box. */

    /* 7-wide × 6-tall classic pixel heart */
    const HEART = [
      [0,1],[0,2],[0,4],[0,5],
      [1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],
      [2,0],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],
      [3,1],[3,2],[3,3],[3,4],[3,5],
      [4,2],[4,3],[4,4],
      [5,3],
    ];

    /* Sleeping cat — curled body 10-wide × 7-tall */
    const CAT = [
      /* ears */   [0,1],[0,2],[0,4],[0,5],
      /* head */   [1,0],[1,1],[1,2],[1,3],[1,4],[1,5],
      /* face+body */ [2,0],[2,1],[2,2],[2,3],[2,4],[2,5],
      /* body */   [3,0],[3,1],[3,2],[3,3],[3,4],[3,5],[3,6],
      [4,1],[4,2],[4,3],[4,4],[4,5],[4,6],[4,7],
      [5,2],[5,3],[5,4],[5,5],[5,6],[5,7],[5,8],
      /* tail */   [4,8],[3,8],[3,9],[4,9],
    ];
    /* Eyes on cat: dim pixels at [2,1],[2,4] */
    const CAT_EYES = [[2,1],[2,4]];

    function _px(ctx, cells, px, ox, oy, color) {
      ctx.fillStyle = color;
      for (const [r, c] of cells) {
        ctx.fillRect(ox + c * px, oy + r * px, px - 1, px - 1);
      }
    }

    /* Draw a single pixel heart, sized to fill the inset box (cw×ch is the
       safe inset box passed by _stepCrtLive, NOT the full canvas). */
    function _drawHeart(ctx, cw, ch, scale, pulse) {
      /* HEART art grid is 7 cols × 6 rows. Fill the box, leave ~8% headroom so
         the 1.08 beat-pulse can never reach the clip edge. */
      const px   = Math.max(2, Math.floor(Math.min(cw / 7, ch / 6) * 0.92));
      const hw   = 7 * px, hh = 6 * px;
      const ox   = Math.round((cw - hw) / 2);
      const oy   = Math.round((ch - hh) / 2);
      const s    = 1 + pulse * 0.08;
      ctx.save();
      ctx.translate(ox + hw / 2, oy + hh / 2);
      ctx.scale(s, s);
      ctx.translate(-(hw / 2), -(hh / 2));
      /* Glow shadow */
      ctx.shadowBlur  = 10 + pulse * 6;
      ctx.shadowColor = C.glow;
      _px(ctx, HEART, px, 0, 0, C.bright);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    /* Draw a sleeping cat + drifting zzz, sized to fill the inset box. */
    function _drawCat(ctx, cw, ch, t) {
      ctx.save();
      /* CAT art grid is 10 cols × 7 rows. Reserve the right ~26% of the box for
         the drifting z's. The cat is the tallest glyph, so hold it to ~0.85 of
         the box height — its soft glow then clears the inset ceiling too. */
      const catBoxW = cw * 0.74;
      const px   = Math.max(2, Math.floor(Math.min(catBoxW / 10, ch / 7) * 0.85));
      const cw_  = 10 * px, ch_ = 7 * px;
      const ox   = Math.round((catBoxW - cw_) / 2);
      /* Sit the cat in the lower-middle so the z's have headroom above it. */
      const oy   = Math.round(ch - ch_ - ch * 0.06);
      ctx.shadowBlur  = 6;
      ctx.shadowColor = C.mid;
      _px(ctx, CAT,      px, ox, oy, C.bright);
      /* closed eyes slightly dimmer */
      _px(ctx, CAT_EYES, px, ox, oy, C.dim);
      ctx.shadowBlur = 0;

      /* Three floating z's — drift up-right but clamped to stay inside the box. */
      ctx.font      = (px * 2) + 'px monospace';
      ctx.textAlign = 'left';
      const zBaseX  = Math.min(cw - px * 2.5, ox + cw_ + px);
      const driftH  = ch * 0.30;        /* total upward travel, bounded */
      for (let i = 0; i < 3; i++) {
        const phase = ((t * 0.0008 + i * 0.33) % 1);
        let zx = zBaseX + i * px * 1.4;
        let zy = oy - i * px * 1.2 - phase * driftH;
        /* Keep the whole glyph inside the box (a z is ~px*2 tall/wide).
           The 2.6× floor leaves room for the glyph's ascent above the
           baseline so the top tip never pokes past the inset ceiling. */
        zx = Math.min(cw - px * 2, Math.max(0, zx));
        zy = Math.max(px * 2.6, zy);
        const alpha = Math.max(0, 1 - phase * 1.5);
        ctx.fillStyle = `rgba(68,204,68,${alpha.toFixed(2)})`;
        ctx.fillText('z', zx, zy);
      }
      ctx.restore();
    }

    /* Draw waveform bars (speaking state), fit to the inset box width.
       Sizing mirrors the heart: uses min(cw, ch) as the reference so bars
       stay comfortably inside the glass regardless of the box aspect ratio. */
    function _drawWaveform(ctx, cw, ch, t) {
      ctx.save();
      /* 4 bars, sized so the group fills ~70% of the smaller dimension.
         This keeps the waveform inside the TV glass on any screen layout. */
      const BAR_COUNT = 4;
      const ref       = Math.min(cw, ch);          /* same reference as heart */
      const maxH      = Math.round(ref * 0.62);
      const minH      = Math.round(ref * 0.10);
      const BAR_W     = Math.max(2, Math.round(ref * 0.10));
      const BAR_GAP   = Math.max(1, Math.round(BAR_W * 0.6));
      const totalW    = BAR_COUNT * (BAR_W + BAR_GAP) - BAR_GAP;
      const startX    = Math.round((cw - totalW) / 2);
      const baseY     = Math.round(ch * 0.80);

      ctx.shadowBlur  = 8;
      ctx.shadowColor = C.glow;
      for (let i = 0; i < BAR_COUNT; i++) {
        const phase = t * 0.0025 + i * 0.72;
        const h     = minH + (maxH - minH) * (0.5 + 0.5 * Math.sin(phase));
        const bh    = Math.round(h);
        const bx    = startX + i * (BAR_W + BAR_GAP);
        ctx.fillStyle = C.bright;
        ctx.fillRect(bx, baseY - bh, BAR_W, bh);
        /* bright tip */
        ctx.fillStyle = C.glow;
        ctx.fillRect(bx, baseY - bh, BAR_W, Math.max(1, Math.round(BAR_W / 2)));
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    /* Draw chess knight (unicode glyph), sized to fill the inset box. */
    function _drawChess(ctx, cw, ch, t) {
      ctx.save();
      const pulse = 0.75 + 0.25 * Math.sin(t * 0.0015);
      /* 0.78 + a downward nudge (0.58) keeps the glyph's ink — which renders
         high of the baseline-middle — fully inside the inset box top & bottom. */
      const sz    = Math.round(Math.min(cw, ch) * 0.78);
      ctx.shadowBlur  = 18;
      ctx.shadowColor = C.glow;
      ctx.fillStyle   = `rgba(68,204,68,${pulse.toFixed(2)})`;
      ctx.font        = `bold ${sz}px monospace`;
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u265e', cw / 2, ch * 0.58);
      ctx.shadowBlur  = 0;
      ctx.restore();
    }

    /* Scanline overlay — drawn every frame on top of pixel art */
    function _drawScanlines(ctx, cw, ch) {
      ctx.save();
      const step = 4;
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      for (let y = 0; y < ch; y += step) {
        ctx.fillRect(0, y, cw, 2);
      }
      ctx.restore();
    }

    /* ─── State machine ─────────────────────────────────────────────────── */
    let _botState      = null;
    let _wsLastMsg     = 0;
    let _lastActivity  = Date.now();  /* tracks last chat/speaking timestamp */

    function _crtState() {
      /* Fallback: WS is silent for >15s (bot offline) */
      if (!_botState || (Date.now() - _wsLastMsg) > 15000) return 'fallback';
      const s = _botState;
      if (s.is_speaking) {
        _lastActivity = Date.now();
        return 'speaking';
      }
      if (s.chess && s.chess.running) return 'chess';
      const lastChatMsg = s.since_last_chat_msg;
      const lastKira    = s.since_kira_spoke;
      const chatRecent  = lastChatMsg != null && lastChatMsg < 30;
      const kiraRecent  = lastKira    != null && lastKira    < 30;
      if (chatRecent || kiraRecent) {
        _lastActivity = Date.now();
        return 'chat';
      }
      /* Idle after 60s of no chat + no speech */
      if ((Date.now() - _lastActivity) > 60000) return 'idle';
      return 'chat';  /* grace window 30–60s */
    }

    /* ─── RAF step for CRT live canvas ─────────────────────────────────── */
    let _crtCanvas = null;
    let _crtCtx    = null;

    function _initCrtLive() {
      const r = CFG.crtDisplayRegion;
      if (!r || !CFG.crtDisplayEnabled) return;
      _crtCanvas = document.getElementById('crt-live');
      if (!_crtCanvas) return;

      const cw = Math.round(r.w * W);
      const ch = Math.round(r.h * H);
      _crtCanvas.width  = cw;
      _crtCanvas.height = ch;
      _crtCanvas.style.left   = Math.round(r.x * W) + 'px';
      _crtCanvas.style.top    = Math.round(r.y * H) + 'px';
      _crtCanvas.style.width  = cw + 'px';
      _crtCanvas.style.height = ch + 'px';

      _crtCtx = _crtCanvas.getContext('2d');
    }

    function _stepCrtLive(t) {
      if (!_crtCtx) return;
      const ctx = _crtCtx;
      const cw  = _crtCanvas.width;
      const ch  = _crtCanvas.height;

      /* Clear to transparent — mix-blend-mode:screen makes dark areas invisible
         so the painted glass shows through, and the glyph glow adds on top */
      ctx.clearRect(0, 0, cw, ch);

      const state = _crtState();

      /* Derive chat_rate for heart beat speed */
      const chatRate = (_botState && _botState.chat_rate) || 0;
      /* Beat period: 2000ms at rate=0, 800ms at rate=10+ msgs/min */
      const beatPeriod = Math.max(800, 2000 - chatRate * 120);

      /* ── Inset box ──────────────────────────────────────────────────────
         Every glyph must render inside this margin so nothing touches the
         bezel/lamp. We translate the origin to the box and hard-clip to it as
         a safety net, then hand each glyph the box dims so it sizes itself to
         fit. The scanlines/flicker below draw on the FULL canvas. */
      const inset = CFG.glyphInsetFrac || 0;
      const ix = Math.round(cw * inset);
      const iy = Math.round(ch * inset);
      const iw = cw - 2 * ix;
      const ih = ch - 2 * iy;

      ctx.save();
      ctx.beginPath();
      ctx.rect(ix, iy, iw, ih);
      ctx.clip();
      ctx.translate(ix, iy);

      switch (state) {
        case 'speaking':
          _drawWaveform(ctx, iw, ih, t);
          break;
        case 'chess':
          _drawChess(ctx, iw, ih, t);
          break;
        case 'chat': {
          const pulse = 0.5 + 0.5 * Math.sin((t / beatPeriod) * Math.PI * 2);
          _drawHeart(ctx, iw, ih, 1, pulse);
          break;
        }
        case 'idle':
          _drawCat(ctx, iw, ih, t);
          break;
        case 'fallback':
        default: {
          /* Static heart — matches the original artwork glyph */
          _drawHeart(ctx, iw, ih, 1, 0);
          break;
        }
      }

      ctx.restore();

      _drawScanlines(ctx, cw, ch);
    }

    /* ─── Bot state WebSocket ────────────────────────────────────────────── */
    let _botWs        = null;
    let _botWsRetry   = 1500;
    let _botReconnectTimer = null;   /* guard: at most one pending reconnect */
    const _BOT_WS   = 'ws://127.0.0.1:8766/ws';
    const _BOT_WS_MAX = 30000;

    function _connectBotWs() {
      _botReconnectTimer = null;   /* this attempt consumes the scheduled slot */

      /* Tear down any prior socket so its handlers can't fire a second
         reconnect chain (over a long stream that would leak sockets/GC). */
      if (_botWs) {
        try {
          _botWs.onopen = _botWs.onmessage = _botWs.onerror = _botWs.onclose = null;
          _botWs.close();
        } catch (_) {}
        _botWs = null;
      }

      let ws;
      try { ws = new WebSocket(_BOT_WS); }
      catch (_) { _scheduleBotReconnect(); return; }
      _botWs = ws;

      ws.onopen = function () { _botWsRetry = 1500; };

      ws.onmessage = function (e) {
        if (ws !== _botWs) return;   /* ignore stragglers from a stale socket */
        try {
          _botState  = JSON.parse(e.data);
          _wsLastMsg = Date.now();
          _applyAmbienceState(_botState.ambience);
        } catch (_) {}
      };

      ws.onerror  = function () {};
      ws.onclose  = function () {
        if (ws !== _botWs) return;   /* superseded socket — its reconnect is moot */
        _scheduleBotReconnect();
      };
    }

    function _scheduleBotReconnect() {
      if (_botReconnectTimer) return;   /* a reconnect is already queued */
      _botReconnectTimer = setTimeout(_connectBotWs, _botWsRetry);
      _botWsRetry = Math.min(_botWsRetry * 2, _BOT_WS_MAX);
    }

    /* ─── Hook into anim.js lifecycle ───────────────────────────────────── */
    window.pageInit = function () {
      _initCrtLive();
      _connectBotWs();

      /* Patch the RAF loop: anim.js calls loop(t) each frame.
         We intercept by overriding the global loop tick via a rAF-aligned hook.
         anim.js exposes no step hook, so we run our own rAF. */
      (function _tick(t) {
        _stepCrtLive(t || 0);
        requestAnimationFrame(_tick);
      })();
    };

  }());
  </script>

  <script>initScene(CFG);</script>
</body>
</html>
